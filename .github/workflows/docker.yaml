name: Docker

on:
  pull_request:
  push:
    branches: ['main']
    tags: ['v*']

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: true

jobs:
  docker:
    permissions:
      contents: read
      packages: write
      security-events: write
    uses: USA-RedDragon/reusable-actions/.github/workflows/docker-ci.yaml@4a4ab216b29662f3424712de85cf3a0a1a0ac7af # v2.0.19
    with:
      push: ${{ github.event_name != 'pull_request' }}
      build-args: |
        VITE_APP_VERSION=${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
        VITE_APP_COMMIT=${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
